openapi: 3.0.3
info:
  title: MateYou Edge Functions API
  description: |
    MateYou 애플리케이션의 Supabase Edge Functions API 문서입니다.

    ## 인증
    모든 보호된 엔드포인트는 Bearer 토큰이 필요합니다.
    ```
    Authorization: Bearer <supabase-jwt-token>
    ```

    ## 응답 형식
    모든 API 응답은 다음 형식을 따릅니다:
    ```json
    {
      "success": true,
      "data": {...},
      "error": {
        "code": "ERROR_CODE",
        "message": "Error description",
        "details": {...}
      },
      "meta": {
        "total": 100,
        "page": 1,
        "limit": 10
      }
    }
    ```
  version: 1.0.0
  contact:
    name: MateYou API Support
    email: support@mateyou.com

servers:
  - url: https://rmooqijhkmomdtkvuzrr.supabase.co/functions/v1
    description: Production server
  - url: http://localhost:54321/functions/v1
    description: Local development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
          description: 응답 성공 여부
        data:
          description: 응답 데이터
        error:
          type: object
          properties:
            code:
              type: string
              description: 에러 코드
            message:
              type: string
              description: 에러 메시지
            details:
              description: 에러 상세 정보
        meta:
          type: object
          properties:
            total:
              type: integer
              description: 전체 항목 수
            page:
              type: integer
              description: 현재 페이지
            limit:
              type: integer
              description: 페이지 당 항목 수
            isPartner:
              type: boolean
              description: 파트너 여부

    Member:
      type: object
      properties:
        id:
          type: string
          description: 멤버 고유 ID
        member_code:
          type: string
          description: 멤버 코드
        name:
          type: string
          description: 멤버 이름
        profile_image:
          type: string
          nullable: true
          description: 프로필 이미지 URL
        favorite_game:
          type: array
          items:
            type: string
          description: 선호 게임 목록
        current_status:
          type: string
          enum: [online, offline, matching, in_game]
          description: 현재 상태
        created_at:
          type: string
          format: date-time
          description: 생성 시간

    Partner:
      type: object
      properties:
        id:
          type: string
          description: 파트너 고유 ID
        member_id:
          type: string
          description: 멤버 ID
        partner_name:
          type: string
          nullable: true
          description: 파트너 이름
        partner_message:
          type: string
          nullable: true
          description: 파트너 소개 메시지
        partner_status:
          type: string
          enum: [none, pending, approved, rejected]
          description: 파트너 상태
        partner_applied_at:
          type: string
          format: date-time
          description: 파트너 신청 시간
        partner_reviewed_at:
          type: string
          format: date-time
          nullable: true
          description: 파트너 검토 시간
        total_points:
          type: integer
          description: 총 포인트
        coins_per_job:
          type: integer
          description: 작업당 코인
        game_info:
          description: 게임 정보
        created_at:
          type: string
          format: date-time
          description: 생성 시간
        updated_at:
          type: string
          format: date-time
          description: 수정 시간
        background_images:
          description: 배경 이미지 정보

    PartnerWithMember:
      allOf:
        - $ref: '#/components/schemas/Partner'
        - type: object
          properties:
            member:
              $ref: '#/components/schemas/Member'
            reviews:
              type: array
              items:
                $ref: '#/components/schemas/Review'

    PartnerJob:
      type: object
      properties:
        id:
          type: string
          description: 작업 고유 ID
        partner_id:
          type: string
          description: 파트너 ID
        job_name:
          type: string
          description: 작업 이름
        job_description:
          type: string
          nullable: true
          description: 작업 설명
        job_price:
          type: integer
          description: 작업 가격
        is_active:
          type: boolean
          description: 활성화 여부
        created_at:
          type: string
          format: date-time
          description: 생성 시간
        updated_at:
          type: string
          format: date-time
          description: 수정 시간

    Review:
      type: object
      properties:
        id:
          type: string
          description: 리뷰 고유 ID
        member_id:
          type: string
          description: 작성자 멤버 ID
        target_partner_id:
          type: string
          description: 대상 파트너 ID
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: 평점 (1-5)
        comment:
          type: string
          nullable: true
          description: 리뷰 내용
        points_earned:
          type: integer
          description: 획득 포인트
        created_at:
          type: string
          format: date-time
          description: 생성 시간
        reviewer_name:
          type: string
          description: 리뷰어 이름 (마스킹됨)

    ChatRoom:
      type: object
      properties:
        id:
          type: string
          description: 채팅방 고유 ID
        created_by:
          type: string
          description: 생성자 멤버 ID
        partner_id:
          type: string
          description: 파트너 멤버 ID
        is_active:
          type: boolean
          description: 활성화 여부
        created_at:
          type: string
          format: date-time
          description: 생성 시간
        updated_at:
          type: string
          format: date-time
          description: 수정 시간

    ChatMessage:
      type: object
      properties:
        id:
          type: string
          description: 메시지 고유 ID
        room_id:
          type: string
          description: 채팅방 ID
        sender_id:
          type: string
          description: 발신자 멤버 ID
        message:
          type: string
          description: 메시지 내용
        message_type:
          type: string
          enum: [text, image, system]
          description: 메시지 타입
        created_at:
          type: string
          format: date-time
          description: 생성 시간

paths:
  # Partners API
  /api-partners/details/{memberCode}:
    get:
      tags:
        - Partners
      summary: 멤버 코드로 파트너 상세 정보 조회
      description: 멤버 코드를 사용해서 파트너의 상세 정보와 리뷰를 조회합니다.
      parameters:
        - name: memberCode
          in: path
          required: true
          description: 멤버 코드
          schema:
            type: string
            example: "USER123"
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PartnerWithMember'
        '404':
          description: 파트너를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api-partners/jobs/{memberId}:
    get:
      tags:
        - Partners
      summary: 파트너의 작업 목록 조회
      description: 멤버 ID로 파트너의 작업 목록을 조회합니다.
      parameters:
        - name: memberId
          in: path
          required: true
          description: 멤버 ID
          schema:
            type: string
        - name: active
          in: query
          required: false
          description: 활성화된 작업만 조회
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PartnerJob'
                      meta:
                        type: object
                        properties:
                          isPartner:
                            type: boolean

  /api-partners/list:
    get:
      tags:
        - Partners
      summary: 파트너 목록 조회 (페이지네이션)
      description: 페이지네이션과 검색 필터가 적용된 파트너 목록을 조회합니다.
      parameters:
        - name: page
          in: query
          required: false
          description: 페이지 번호
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          required: false
          description: 페이지 당 항목 수
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: search
          in: query
          required: false
          description: 검색어
          schema:
            type: string
        - name: game
          in: query
          required: false
          description: 게임 필터
          schema:
            type: string
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PartnerWithMember'

  /api-partners/recent:
    get:
      tags:
        - Partners
      summary: 최근 파트너 목록 조회
      description: 최근에 등록된 파트너 목록을 조회합니다.
      parameters:
        - name: limit
          in: query
          required: false
          description: 조회할 항목 수
          schema:
            type: integer
            default: 6
            minimum: 1
            maximum: 20
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PartnerWithMember'

  # Auth API
  /api-auth/me:
    get:
      tags:
        - Authentication
      summary: 현재 사용자 정보 조회
      description: 인증된 사용자의 정보를 조회합니다.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            type: object
                            description: Supabase 사용자 정보
                          member:
                            $ref: '#/components/schemas/Member'
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api-auth/profile:
    put:
      tags:
        - Authentication
      summary: 사용자 프로필 업데이트
      description: 인증된 사용자의 프로필을 업데이트합니다.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 이름
                favorite_game:
                  type: array
                  items:
                    type: string
                  description: 선호 게임 목록
                current_status:
                  type: string
                  enum: [online, offline, matching, in_game]
                  description: 현재 상태
                profile_image:
                  type: string
                  nullable: true
                  description: 프로필 이미지 URL
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Member'

  /api-auth/partner-status:
    get:
      tags:
        - Authentication
      summary: 파트너 상태 조회
      description: 인증된 사용자의 파트너 상태를 조회합니다.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          isPartner:
                            type: boolean
                          partnerStatus:
                            type: string
                            enum: [none, pending, approved, rejected]
                          partnerId:
                            type: string
                            nullable: true
                          partnerName:
                            type: string
                            nullable: true
                          totalPoints:
                            type: integer

  /api-auth/partner-apply:
    post:
      tags:
        - Authentication
      summary: 파트너 신청
      description: 파트너로 신청합니다.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - partner_name
              properties:
                partner_name:
                  type: string
                  description: 파트너 이름
                partner_message:
                  type: string
                  nullable: true
                  description: 파트너 소개 메시지
                game_info:
                  description: 게임 정보
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Partner'

  # Chat API
  /api-chat/rooms:
    get:
      tags:
        - Chat
      summary: 채팅방 목록 조회
      description: 사용자의 채팅방 목록을 조회합니다.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          allOf:
                            - $ref: '#/components/schemas/ChatRoom'
                            - type: object
                              properties:
                                latest_message:
                                  $ref: '#/components/schemas/ChatMessage'
                                  nullable: true

    post:
      tags:
        - Chat
      summary: 채팅방 생성 또는 조회
      description: 새로운 채팅방을 생성하거나 기존 채팅방을 조회합니다.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - partner_id
              properties:
                partner_id:
                  type: string
                  description: 파트너 멤버 ID
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ChatRoom'

  /api-chat/messages/{roomId}:
    get:
      tags:
        - Chat
      summary: 채팅방 메시지 목록 조회
      description: 특정 채팅방의 메시지 목록을 조회합니다.
      security:
        - BearerAuth: []
      parameters:
        - name: roomId
          in: path
          required: true
          description: 채팅방 ID
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: 페이지 번호
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          description: 페이지 당 메시지 수
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ChatMessage'

  /api-chat/messages:
    post:
      tags:
        - Chat
      summary: 메시지 전송
      description: 채팅방에 메시지를 전송합니다.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - room_id
                - message
              properties:
                room_id:
                  type: string
                  description: 채팅방 ID
                message:
                  type: string
                  description: 메시지 내용
                message_type:
                  type: string
                  enum: [text, image, system]
                  default: text
                  description: 메시지 타입
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ChatMessage'

  /api-chat/rooms/{roomId}:
    delete:
      tags:
        - Chat
      summary: 채팅방 비활성화
      description: 채팅방을 비활성화합니다.
      security:
        - BearerAuth: []
      parameters:
        - name: roomId
          in: path
          required: true
          description: 채팅방 ID
          schema:
            type: string
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ChatRoom'

    /api-storage/upload:
      post:
        tags:
          - Storage
        summary: 파일 업로드
        description: 이미지 파일을 Supabase Storage에 업로드합니다.
        security:
          - BearerAuth: []
        requestBody:
          required: true
          content:
            multipart/form-data:
              schema:
                type: object
                required:
                  - file
                  - bucket
                  - path
                properties:
                  file:
                    type: string
                    format: binary
                    description: 업로드할 이미지 파일
                  bucket:
                    type: string
                    description: Storage 버킷 이름
                    example: "avatars"
                  path:
                    type: string
                    description: 파일 저장 경로
                    example: "user-123/avatar.jpg"
                  upsert:
                    type: boolean
                    default: true
                    description: 기존 파일 덮어쓰기 여부
        responses:
          '200':
            description: 성공
            content:
              application/json:
                schema:
                  allOf:
                    - $ref: '#/components/schemas/ApiResponse'
                    - type: object
                      properties:
                        data:
                          type: object
                          properties:
                            success:
                              type: boolean
                            url:
                              type: string
                              description: 업로드된 파일의 공개 URL
                            path:
                              type: string
                              description: 파일 경로
                            size:
                              type: integer
                              description: 파일 크기
                            type:
                              type: string
                              description: 파일 타입

    /api-storage/delete:
      delete:
        tags:
          - Storage
        summary: 파일 삭제
        description: Storage에서 파일을 삭제합니다.
        security:
          - BearerAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - bucket
                  - path
                properties:
                  bucket:
                    type: string
                    description: Storage 버킷 이름
                  path:
                    type: string
                    description: 삭제할 파일 경로
        responses:
          '200':
            description: 성공

    /api-storage/generate-path:
      post:
        tags:
          - Storage
        summary: 고유 파일 경로 생성
        description: 고유한 파일 저장 경로를 생성합니다.
        security:
          - BearerAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - originalName
                properties:
                  originalName:
                    type: string
                    description: 원본 파일명
                  memberCode:
                    type: string
                    description: 멤버 코드
                  userId:
                    type: string
                    description: 사용자 ID
        responses:
          '200':
            description: 성공

    # Reviews API (추가)
    /api-reviews/submit:
      post:
        tags:
          - Reviews
        summary: 리뷰 작성/수정
        description: 새로운 리뷰를 작성하거나 기존 리뷰를 수정합니다.
        security:
          - BearerAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - partner_id
                  - rating
                properties:
                  partner_id:
                    type: string
                    description: 파트너 ID
                  rating:
                    type: integer
                    minimum: 1
                    maximum: 5
                    description: 평점
                  comment:
                    type: string
                    description: 리뷰 내용
                  request_id:
                    type: string
                    description: 요청 ID (특정 요청에 대한 리뷰인 경우)
                  existing_review_id:
                    type: string
                    description: 기존 리뷰 ID (수정하는 경우)
                  points_earned:
                    type: integer
                    default: 10
                    description: 획득 포인트
        responses:
          '200':
            description: 성공

    # Partner Dashboard API
    /api-partner-dashboard/jobs:
      post:
        tags:
          - Partner Dashboard
        summary: 파트너 작업 생성
        description: 새로운 파트너 작업을 생성합니다.
        security:
          - BearerAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - job_name
                  - coins_per_job
                properties:
                  job_name:
                    type: string
                    description: 작업 이름
                  job_description:
                    type: string
                    description: 작업 설명
                  coins_per_job:
                    type: integer
                    description: 작업당 코인
        responses:
          '200':
            description: 성공

    /api-partner-dashboard/requests:
      get:
        tags:
          - Partner Dashboard
        summary: 파트너 요청 목록 조회
        description: 파트너에게 온 요청 목록을 조회합니다.
        security:
          - BearerAuth: []
        parameters:
          - name: page
            in: query
            schema:
              type: integer
              default: 1
          - name: limit
            in: query
            schema:
              type: integer
              default: 20
          - name: status
            in: query
            schema:
              type: string
              enum: [pending, accepted, rejected, completed]
        responses:
          '200':
            description: 성공

    # Members API
    /api-members/search:
      get:
        tags:
          - Members
        summary: 멤버 검색
        description: 이름이나 멤버 코드로 멤버를 검색합니다.
        parameters:
          - name: q
            in: query
            required: true
            description: 검색어 (최소 2자)
            schema:
              type: string
          - name: page
            in: query
            schema:
              type: integer
              default: 1
          - name: limit
            in: query
            schema:
              type: integer
              default: 20
        responses:
          '200':
            description: 성공

    /api-members/chat/send:
      post:
        tags:
          - Members
        summary: 채팅 메시지 전송
        description: 다른 멤버에게 채팅 메시지를 전송합니다.
        security:
          - BearerAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - receiver_id
                  - message
                properties:
                  receiver_id:
                    type: string
                    description: 수신자 ID
                  message:
                    type: string
                    description: 메시지 내용
        responses:
          '200':
            description: 성공

    /api-members/chat/rooms:
      get:
        tags:
          - Members
        summary: 채팅방 목록 조회
        description: 사용자의 채팅방 목록을 조회합니다.
        security:
          - BearerAuth: []
        responses:
          '200':
            description: 성공

    # Admin API
    /api-admin/partners:
      get:
        tags:
          - Admin
        summary: 파트너 목록 관리
        description: 모든 파트너 목록을 조회합니다. (관리자 전용)
        security:
          - BearerAuth: []
        parameters:
          - name: status
            in: query
            schema:
              type: string
              enum: [pending, approved, rejected]
          - name: page
            in: query
            schema:
              type: integer
              default: 1
          - name: limit
            in: query
            schema:
              type: integer
              default: 20
        responses:
          '200':
            description: 성공
          '403':
            description: 관리자 권한 필요

    /api-admin/partners/{partnerId}/status:
      put:
        tags:
          - Admin
        summary: 파트너 상태 업데이트
        description: 파트너의 승인/거부 상태를 업데이트합니다. (관리자 전용)
        security:
          - BearerAuth: []
        parameters:
          - name: partnerId
            in: path
            required: true
            schema:
              type: string
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum: [pending, approved, rejected]
                  review_notes:
                    type: string
                    description: 검토 노트
        responses:
          '200':
            description: 성공

    /api-admin/banners:
      get:
        tags:
          - Admin
        summary: 배너 목록 조회
        description: 모든 광고 배너를 조회합니다. (관리자 전용)
        security:
          - BearerAuth: []
        responses:
          '200':
            description: 성공

      post:
        tags:
          - Admin
        summary: 배너 생성
        description: 새로운 광고 배너를 생성합니다. (관리자 전용)
        security:
          - BearerAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - title
                  - image_url
                properties:
                  title:
                    type: string
                    description: 배너 제목
                  description:
                    type: string
                    description: 배너 설명
                  image_url:
                    type: string
                    description: 배너 이미지 URL
                  link_url:
                    type: string
                    description: 링크 URL
                  is_active:
                    type: boolean
                    default: true
                    description: 활성화 여부
        responses:
          '200':
            description: 성공

tags:
  - name: Partners
    description: 파트너 관련 API
  - name: Authentication
    description: 인증 및 사용자 관련 API
  - name: Chat
    description: 채팅 관련 API
  - name: Storage
    description: 파일 저장소 관련 API
  - name: Reviews
    description: 리뷰 관련 API
  - name: Partner Dashboard
    description: 파트너 대시보드 API
  - name: Members
    description: 멤버 관련 API
  - name: Admin
    description: 관리자 전용 API